server.address=0.0.0.0
server.port=${PORT}

server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

spring.datasource.url=${DATABASE_URL}?prepareThreshold=0
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool — sized for Render's free PostgreSQL (small).
# Tune via env vars when moving to a larger plan.
spring.datasource.hikari.pool-name=cmms-hikari
spring.datasource.hikari.connection-init-sql=SET search_path=public
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:20000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=${HIKARI_LEAK_THRESHOLD:30000}
spring.datasource.hikari.validation-timeout=5000

spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Schema is owned by Flyway in prod. Hibernate only validates that entities
# match the migrated schema; it never mutates the database.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Batch writes — JDBC roundtrips per insert/update drop significantly when
# Hibernate groups statements. Order_inserts/updates rearrange operations so
# the batch can actually be flushed in a single network call.
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Default fetch size for scrollable result sets / non-paged queries.
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ===============================
# FLYWAY (prod — PostgreSQL)
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Existing prod databases were previously managed by Hibernate ddl-auto.
# baseline-on-migrate=true lets Flyway adopt the current schema as the baseline
# on first run, instead of trying to recreate tables that already exist.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Hibernate-managed schema (legacy)
spring.flyway.validate-on-migrate=true

jwt.secret=${JWT_SECRET}
# Default access token TTL: 15 minutes.
jwt.expiration=${JWT_EXPIRATION:900000}

# ===============================
# CACHE (Caffeine — prod)
# ===============================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# ===============================
# ACTUATOR (prod — minimal exposure)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===============================
# EMAIL (prod)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ===============================
# APP CONFIG (prod)
# ===============================
app.frontend.url=${FRONTEND_URL:https://cmms-frontend.vercel.app}
app.self.url=${SELF_URL:https://cmms-backend-8y7h.onrender.com}
google.client.id=${GOOGLE_CLIENT_ID:}

# CORS whitelist (CSV). Em prod, definir APP_CORS_ALLOWED_ORIGINS=
# https://cmms.example.com,https://staging.cmms.example.com
# (Sem * a menos que explicitamente desejado.)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://cmms-frontend.vercel.app}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:false}

# Prod bootstrap admin (optional). When both are set and the user does not yet
# exist, a SUPER_ADMIN account is provisioned on startup.
app.bootstrap.super-admin.email=${SUPER_ADMIN_EMAIL:}
app.bootstrap.super-admin.password=${SUPER_ADMIN_PASSWORD:}
