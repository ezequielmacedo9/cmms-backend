server.address=0.0.0.0
server.port=${PORT}

server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

spring.datasource.url=${DATABASE_URL}?prepareThreshold=0
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET search_path=public
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===============================
# CACHE (Caffeine — prod)
# ===============================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# ===============================
# ACTUATOR (prod — minimal exposure)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===============================
# EMAIL (prod)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ===============================
# APP CONFIG (prod)
# ===============================
app.frontend.url=${FRONTEND_URL:https://cmms-frontend.vercel.app}
app.self.url=${SELF_URL:https://cmms-backend-8y7h.onrender.com}
google.client.id=${GOOGLE_CLIENT_ID:}
