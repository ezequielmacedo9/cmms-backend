# ===============================
# SERVER
# ===============================
server.port=8080

# GZIP response compression — replicate prod config in dev so payload
# sizes match what the frontend will see in production.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# ===============================
# DATABASE LOCAL (H2)
# ===============================
spring.datasource.url=jdbc:h2:mem:cmmsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway is disabled in dev (H2 in-memory). Schema is managed by Hibernate.
# Prod profile re-enables Flyway against PostgreSQL.
spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT CONFIG
# ===============================
# JWT_SECRET MUST be provided via environment variable.
# Minimum 32 bytes (256 bits) for HS256. Generate with:
#   openssl rand -base64 48
# The application will fail to start if this is missing or too short.
jwt.secret=${JWT_SECRET}
# Default access token TTL: 15 minutes. Refresh tokens (7 days) live in the
# `refresh_token` table and are rotated on every use.
jwt.expiration=${JWT_EXPIRATION:900000}

# ===============================
# CACHE (Caffeine)
# ===============================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
# Group exposing the custom AppHealthIndicator separately at /actuator/health/app
management.endpoint.health.group.app.include=appHealth
management.endpoint.health.group.app.show-details=always
management.info.env.enabled=true
info.app.name=CMMS Industrial Suite
info.app.version=2.0.0
info.app.description=Sistema de Gerenciamento de Manutenção Industrial

# ===============================
# EMAIL (configure via env vars or fill here for local dev)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@cmms.app}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ===============================
# APP CONFIG
# ===============================
app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.self.url=${SELF_URL:http://localhost:8080}
google.client.id=${GOOGLE_CLIENT_ID:}

# ===============================
# ASYNC
# ===============================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# ===============================
# PAYMENT GATEWAY (Asaas)
# Disabled while ASAAS_API_KEY is empty: checkout activates the plan manually.
# Set the key + webhook token in production to enable real billing.
# ===============================
asaas.api-key=${ASAAS_API_KEY:}
asaas.base-url=${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN:}

# ===============================
# ERROR MONITORING (Sentry)
# Disabled automatically when SENTRY_DSN is empty. Set SENTRY_DSN +
# SENTRY_ENVIRONMENT=prod in production to start capturing errors.
# ===============================
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:dev}
sentry.traces-sample-rate=0.0
sentry.send-default-pii=false
