# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE LOCAL (H2)
# ===============================
spring.datasource.url=jdbc:h2:mem:cmmsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=cmms-super-secret-key-para-jwt-256bits-segura-2026
jwt.expiration=86400000

# ===============================
# CACHE (Caffeine)
# ===============================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=CMMS Industrial Suite
info.app.version=2.0.0
info.app.description=Sistema de Gerenciamento de Manutenção Industrial

# ===============================
# EMAIL (configure via env vars or fill here for local dev)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@cmms.app}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ===============================
# APP CONFIG
# ===============================
app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.self.url=${SELF_URL:http://localhost:8080}
google.client.id=${GOOGLE_CLIENT_ID:}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===============================
# ASYNC
# ===============================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
