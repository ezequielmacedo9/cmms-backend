name: CI

# Build + test gate. Runs on every push and PR to main so a red build is
# caught before it reaches Render. The Maven project lives in cmms/.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & test (Java 17)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cmms
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run tests
        env:
          # CI uses an ephemeral secret; production sets the real JWT_SECRET.
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-only-jwt-secret-please-override-32bytes-minimum' }}
        run: |
          chmod +x mvnw
          ./mvnw -B -ntp test
